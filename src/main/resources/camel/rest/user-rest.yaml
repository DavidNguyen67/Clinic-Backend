- rest:
    path: /v1/admin/user
    post:
      - path: /
        to: direct:admin-user-create
    get:
      - path: /
        to: direct:admin-user-list
      - path: /count
        to: direct:admin-user-count
      - path: /statistics
        to: direct:admin-user-statistics
      - path: /{id}
        to: direct:admin-user-get

    patch:
      - path: /{id}
        to: direct:admin-user-update
      - path: /restore/{id}
        to: direct:admin-user-restore
    delete:
      - path: /{id}
        to: direct:admin-user-delete

- rest:
    path: /v1/public/user
    get:
      - path: /statistics
        to: direct:public-user-statistics
      - path: /
        to: direct:public-user-list
